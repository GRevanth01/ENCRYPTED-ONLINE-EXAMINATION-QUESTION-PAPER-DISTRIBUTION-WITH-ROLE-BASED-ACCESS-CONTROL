<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Secure Exam System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-lightest: #FFF5F7;
            --pink-light: #FFE4E9;
            --pink-medium: #FFE0E6;
            --pink-border: #FFC0CB;
            --pink-accent: #FFB6C1;
            --rose-primary: #E11D48;
            --rose-dark: #BE123C;
            --rose-deep: #D91656;
            --green-success: #10B981;
            --card-bg: #FFFBFC;
        }
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, var(--pink-lightest) 0%, var(--pink-light) 100%);
            min-height: 100vh;
        }
        
        .navbar-custom {
            background: linear-gradient(90deg, var(--rose-primary) 0%, var(--rose-deep) 100%);
            box-shadow: 0 4px 15px rgba(217, 22, 86, 0.3);
        }
        
        .navbar-custom .navbar-brand,
        .navbar-custom .nav-link {
            color: white !important;
        }
        
        .navbar-custom .nav-link:hover {
            color: var(--pink-light) !important;
        }
        
        .card {
            background: var(--card-bg);
            border: 1px solid var(--pink-border);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(255, 182, 193, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(217, 22, 86, 0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--rose-primary) 0%, var(--rose-deep) 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, var(--rose-deep) 0%, var(--rose-dark) 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(217, 22, 86, 0.4);
        }
        
        .btn-outline-primary {
            color: var(--rose-primary);
            border: 2px solid var(--rose-primary);
            border-radius: 10px;
            padding: 10px 22px;
            font-weight: 600;
        }
        
        .btn-outline-primary:hover {
            background: var(--rose-primary);
            color: white;
        }
        
        .form-control {
            border: 2px solid var(--pink-border);
            border-radius: 10px;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: var(--rose-primary);
            box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.15);
        }
        
        .alert-success {
            background: linear-gradient(135deg, #D1FAE5 0%, #A7F3D0 100%);
            border: none;
            border-radius: 12px;
            color: #065F46;
        }
        
        .alert-danger {
            background: linear-gradient(135deg, #FEE2E2 0%, #FECACA 100%);
            border: none;
            border-radius: 12px;
            color: #991B1B;
        }
        
        .icon-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .icon-circle.pink {
            background: linear-gradient(135deg, var(--pink-light) 0%, var(--pink-accent) 100%);
            color: var(--rose-deep);
        }
        
        .icon-circle.green {
            background: linear-gradient(135deg, #D1FAE5 0%, #A7F3D0 100%);
            color: #059669;
        }
        
        .icon-circle.rose {
            background: linear-gradient(135deg, var(--rose-primary) 0%, var(--rose-deep) 100%);
            color: white;
        }
        
        .sidebar {
            background: linear-gradient(180deg, var(--pink-medium) 0%, var(--pink-light) 100%);
            min-height: calc(100vh - 76px);
            border-right: 2px solid var(--pink-border);
        }
        
        .sidebar .nav-link {
            color: var(--rose-dark);
            padding: 14px 20px;
            border-radius: 12px;
            margin: 4px 12px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: linear-gradient(135deg, var(--rose-primary) 0%, var(--rose-deep) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(217, 22, 86, 0.3);
        }
        
        .sidebar .nav-link i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        
        .table {
            border-radius: 12px;
            overflow: hidden;
        }
        
        .table thead {
            background: linear-gradient(135deg, var(--pink-light) 0%, var(--pink-accent) 100%);
        }
        
        .table thead th {
            border: none;
            color: var(--rose-dark);
            font-weight: 600;
            padding: 16px;
        }
        
        .table tbody tr {
            transition: background 0.3s ease;
        }
        
        .table tbody tr:hover {
            background: var(--pink-lightest);
        }
        
        .badge-encrypted {
            background: linear-gradient(135deg, var(--rose-primary) 0%, var(--rose-deep) 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .badge-active {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--pink-border);
        }
        
        .stat-card h3 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--rose-deep);
        }
        
        .mono-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            background: #F3F4F6;
            padding: 8px 12px;
            border-radius: 8px;
            word-break: break-all;
        }
        
        .timeline-item {
            border-left: 3px solid var(--pink-border);
            padding-left: 20px;
            margin-left: 10px;
            padding-bottom: 20px;
        }
        
        .timeline-item:last-child {
            border-left: none;
        }
        
        .timeline-dot {
            width: 12px;
            height: 12px;
            background: var(--rose-primary);
            border-radius: 50%;
            position: absolute;
            left: -7px;
        }
        
        .encryption-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .encryption-badge.locked {
            background: linear-gradient(135deg, var(--rose-primary) 0%, var(--rose-deep) 100%);
            color: white;
        }
        
        .encryption-badge.unlocked {
            background: linear-gradient(135deg, var(--green-success) 0%, #059669 100%);
            color: white;
        }
    </style>
</head>
<body>
    {% block navbar %}{% endblock %}
    
    <div class="container-fluid">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="row justify-content-center mt-3">
                    <div class="col-md-8">
                        {% for category, message in messages %}
                            <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show" role="alert">
                                <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' }} me-2"></i>
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            {% endif %}
        {% endwith %}
    </div>
    
    {% block content %}{% endblock %}
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
