{% extends 'base.html' %}

{% block title %}AEF Login - SecureExam{% endblock %}

{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('auth.home') }}">
            <i class="fas fa-shield-alt me-2"></i>SecureExam
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{{ url_for('auth.home') }}">
                <i class="fas fa-home me-1"></i>Home
            </a>
        </div>
    </div>
</nav>
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card p-4">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <div class="icon-circle green mx-auto mb-3">
                            <i class="fas fa-chalkboard-teacher"></i>
                        </div>
                        <h3 class="fw-bold" style="color: var(--rose-deep);">
                            Faculty Login
                        </h3>
                        <p class="text-muted">Access your authorized exam papers</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.aef_login') }}">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-envelope me-2 text-success"></i>Email Address
                            </label>
                            <input type="email" name="email" class="form-control" required placeholder="Enter your email">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-lock me-2 text-success"></i>Password
                            </label>
                            <input type="password" name="password" class="form-control" required placeholder="Enter your password">
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>Login to Dashboard
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="text-muted mb-0">
                            Don't have an account?
                            <a href="{{ url_for('auth.aef_signup') }}" class="text-decoration-none" style="color: var(--rose-primary);">
                                <i class="fas fa-user-plus me-1"></i>Register here
                            </a>
                        </p>
                    </div>
                    
                    <hr class="my-4">
                    
                    <div class="text-center">
                        <p class="small text-muted mb-2">
                            <i class="fas fa-user-shield me-1"></i>Authorized Access Only
                        </p>
                        <div class="d-flex justify-content-center gap-3">
                            <span class="badge-encrypted">
                                <i class="fas fa-lock me-1"></i>Encrypted
                            </span>
                            <span class="badge-active">
                                <i class="fas fa-check me-1"></i>Secure
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
