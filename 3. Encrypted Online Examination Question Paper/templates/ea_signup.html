{% extends 'base.html' %}

{% block title %}EA Signup - SecureExam{% endblock %}

{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('auth.home') }}">
            <i class="fas fa-shield-alt me-2"></i>SecureExam
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{{ url_for('auth.home') }}">
                <i class="fas fa-home me-1"></i>Home
            </a>
        </div>
    </div>
</nav>
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card p-4">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <div class="icon-circle rose mx-auto mb-3">
                            <i class="fas fa-user-tie"></i>
                        </div>
                        <h3 class="fw-bold" style="color: var(--rose-deep);">
                            Administrator Registration
                        </h3>
                        <p class="text-muted">Create your Examination Administrator account</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.ea_signup') }}">
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label fw-semibold">
                                    <i class="fas fa-user me-2 text-danger"></i>Full Name <span class="text-danger">*</span>
                                </label>
                                <input type="text" name="full_name" class="form-control" required placeholder="Enter your full name">
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="fas fa-envelope me-2 text-danger"></i>Email <span class="text-danger">*</span>
                                </label>
                                <input type="email" name="email" class="form-control" required placeholder="email@example.com">
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="fas fa-id-card me-2 text-danger"></i>Employee ID <span class="text-danger">*</span>
                                </label>
                                <input type="text" name="employee_id" class="form-control" required placeholder="EMP001">
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="fas fa-building me-2 text-danger"></i>Department <span class="text-danger">*</span>
                                </label>
                                <select name="department" class="form-control" required>
                                    <option value="">Select Department</option>
                                    <option value="Examination Cell">Examination Cell</option>
                                    <option value="Administration">Administration</option>
                                    <option value="Academic Affairs">Academic Affairs</option>
                                    <option value="Computer Science">Computer Science</option>
                                    <option value="Engineering">Engineering</option>
                                    <option value="Science">Science</option>
                                    <option value="Commerce">Commerce</option>
                                    <option value="Arts">Arts</option>
                                </select>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="fas fa-user-tag me-2 text-danger"></i>Designation <span class="text-danger">*</span>
                                </label>
                                <select name="designation" class="form-control" required>
                                    <option value="">Select Designation</option>
                                    <option value="Controller of Examinations">Controller of Examinations</option>
                                    <option value="Deputy Controller">Deputy Controller</option>
                                    <option value="Assistant Controller">Assistant Controller</option>
                                    <option value="Examination Officer">Examination Officer</option>
                                    <option value="Senior Clerk">Senior Clerk</option>
                                </select>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="fas fa-phone me-2 text-danger"></i>Contact Number <span class="text-danger">*</span>
                                </label>
                                <input type="tel" name="contact_number" class="form-control" required placeholder="+91 XXXXX XXXXX">
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    <i class="fas fa-map-marker-alt me-2 text-danger"></i>Office Location <span class="text-danger">*</span>
                                </label>
                                <input type="text" name="office_location" class="form-control" required placeholder="Building/Room No.">
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label fw-semibold">
                                    <i class="fas fa-lock me-2 text-danger"></i>Password <span class="text-danger">*</span>
                                </label>
                                <input type="password" name="password" class="form-control" required minlength="6" placeholder="Minimum 6 characters">
                            </div>
                            
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="fas fa-user-plus me-2"></i>Create Administrator Account
                                </button>
                            </div>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="text-muted mb-0">
                            Already have an account?
                            <a href="{{ url_for('auth.ea_login') }}" class="text-decoration-none" style="color: var(--rose-primary);">
                                <i class="fas fa-sign-in-alt me-1"></i>Login here
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
